services:
  postgres:
    image: postgres:16-alpine
    container_name: veg_fruit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veg_fruit}
      POSTGRES_USER: ${POSTGRES_USER:-veg_fruit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veg_fruit_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: veg_fruit_backend
    working_dir: /app
    command: sh -lc "npm ci && npm run dev"
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001

      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-veg_fruit}
      PGUSER: ${POSTGRES_USER:-veg_fruit}
      PGPASSWORD: ${POSTGRES_PASSWORD:-veg_fruit_password}

      ADMIN_LOGIN: ${ADMIN_LOGIN:-miksgoldfruct}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-"Miksgold1!"}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_me}

      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}

      # Telegram (уведомления о новых заказах) — можно задать здесь или через .env / переменные хоста
      TELEGRAM_ORDER_NOTIFICATIONS_ENABLED: ${TELEGRAM_ORDER_NOTIFICATIONS_ENABLED:-true}
      TELEGRAM_BOT_TOKEN: "8654337012:AAHCrTWODcy6cZ9qRWj7KCZpBQ6mtbKREvY"
      TELEGRAM_CHAT_ID: "1045774342"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: veg_fruit_frontend
    working_dir: /app
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pg_data:
    name: veg_fruit_pg_data

