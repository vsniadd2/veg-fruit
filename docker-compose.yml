services:
  postgres:
    image: postgres:16-alpine
    container_name: veg_fruit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veg_fruit}
      POSTGRES_USER: ${POSTGRES_USER:-veg_fruit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veg_fruit_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: veg_fruit_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001

      # DB connection for node-postgres (pg)
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-veg_fruit}
      PGUSER: ${POSTGRES_USER:-veg_fruit}
      PGPASSWORD: ${POSTGRES_PASSWORD:-veg_fruit_password}

      # Admin auth (поменяйте на свои значения)
      ADMIN_LOGIN: ${ADMIN_LOGIN:-miksgoldfruct}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-"Miksgold1!"}
      JWT_SECRET: ${JWT_SECRET:-change_me_prod_jwt_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_prod_jwt_refresh_secret}

      # CORS для админки/сайта (добавьте свой домен/айпи)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://178.172.201.107,http://miksgoldfruct.by,http://www.miksgoldfruct.by,https://miksgoldfruct.by,https://www.miksgoldfruct.by}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    container_name: veg_fruit_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "443:443"
    volumes:
      # Положите на сервер рядом с compose: ssl/fullchain.pem и ssl/privkey.pem
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  pg_data:
    name: veg_fruit_pg_data


