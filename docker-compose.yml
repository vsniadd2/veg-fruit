services:
  postgres:
    image: postgres:16-alpine
    container_name: veg_fruit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: veg_fruit
      POSTGRES_USER: veg_fruit
      POSTGRES_PASSWORD: veg_fruit_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:

