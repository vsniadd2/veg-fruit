# HTTPS — домен (сертификаты монтируются в /etc/nginx/ssl/)
# Без [::] и без http2 — в Docker чаще стабильнее
server {
  listen 443 ssl;
  server_name miksgoldfruct.by www.miksgoldfruct.by;

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  client_max_body_size 5m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# Редирект с HTTP на HTTPS только для домена
server {
  listen 80;
  server_name miksgoldfruct.by www.miksgoldfruct.by;
  return 301 https://$host$request_uri;
}

# HTTP по IP или другому имени (без SSL), как раньше
server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 5m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
